<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>연애 스타일 테스트</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 25px;
  border-radius: 20px;
  width: 320px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  text-align: center;
}

button {
  display: block;
  width: 100%;
  margin: 8px 0;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #333;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #555;
}
</style>
</head>

<body>

<div class="container">
  <h2 id="question"></h2>
  <div id="answers"></div>
</div>

<script>
const questions = [
  {
    q: "데이트에서 가장 중요한 것은?",
    a: [
      { text: "감정 교류", type: "romantic" },
      { text: "재미와 활동", type: "fun" },
      { text: "안정감", type: "stable" },
      { text: "자유로운 분위기", type: "free" }
    ]
  },
  {
    q: "연락 스타일은?",
    a: [
      { text: "자주 연락", type: "romantic" },
      { text: "필요할 때만", type: "free" },
      { text: "적당히 꾸준히", type: "stable" },
      { text: "재밌게 가볍게", type: "fun" }
    ]
  },
  {
    q: "싸웠을 때 나는?",
    a: [
      { text: "바로 풀고 싶다", type: "romantic" },
      { text: "시간이 필요하다", type: "free" },
      { text: "차분히 해결", type: "stable" },
      { text: "분위기 전환", type: "fun" }
    ]
  },
  {
    q: "이상적인 연애는?",
    a: [
      { text: "영화 같은 사랑", type: "romantic" },
      { text: "친구 같은 연애", type: "fun" },
      { text: "결혼까지 생각", type: "stable" },
      { text: "각자의 삶 존중", type: "free" }
    ]
  },
  {
    q: "선물 스타일은?",
    a: [
      { text: "감동적인 편지", type: "romantic" },
      { text: "실용적인 것", type: "stable" },
      { text: "재밌는 것", type: "fun" },
      { text: "부담 없는 것", type: "free" }
    ]
  }
];

const results = {
  romantic: {
    title: "감성 몰입형",
    desc: "사랑에 깊게 빠지는 타입. 감정 표현이 풍부함",
    match: "현실 안정형"
  },
  fun: {
    title: "유쾌 자유형",
    desc: "재미와 설렘 중심의 연애",
    match: "감성형"
  },
  stable: {
    title: "현실 안정형",
    desc: "책임감 있고 오래가는 관계 선호",
    match: "자유형"
  },
  free: {
    title: "자유 존중형",
    desc: "개인 시간을 중요시하는 스타일",
    match: "안정형"
  }
};

let step = 0;
let answers = [];

function render() {
  const qEl = document.getElementById("question");
  const aEl = document.getElementById("answers");

  if (step >= questions.length) {
    const resultType = getResult();
    const result = results[resultType];

    qEl.innerText = result.title;
    aEl.innerHTML = `
      <p>${result.desc}</p>
      <p><strong>궁합 추천: ${result.match}</strong></p>
      <button onclick="restart()">다시하기</button>
    `;
    return;
  }

  const current = questions[step];
  qEl.innerText = current.q;

  aEl.innerHTML = "";
  current.a.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt.text;
    btn.onclick = () => {
      answers.push(opt.type);
      step++;
      render();
    };
    aEl.appendChild(btn);
  });
}

function getResult() {
  const count = {};
  answers.forEach(a => {
    count[a] = (count[a] || 0) + 1;
  });
  return Object.keys(count).reduce((a, b) =>
    count[a] > count[b] ? a : b
  );
}

function restart() {
  step = 0;
  answers = [];
  render();
}

render();
</script>

</body>
</html>
